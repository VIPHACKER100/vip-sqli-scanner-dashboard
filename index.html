<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIP SQLi Scanner — Minimalist Modern</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Calistoga&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --background: #FFFFFF;
      --background-alt: #F8FAFC;
      --foreground: #0F172A;
      --accent: #0052FF;
      --accent-secondary: #4D7CFF;
      --muted: #F1F5F9;
      --muted-foreground: #64748B;
      --border: #E2E8F0;
      --border-strong: #CBD5E1;
      --card: #FFFFFF;
      --card-elevated: #FFFFFF;
      --header-bg: rgba(255, 255, 255, 0.7);
      --terminal-bg: #0F172A;
    }

    html.dark {
      --background: #020617;
      --background-alt: #0B1121;
      --foreground: #F8FAFC;
      --accent: #3B82F6;
      --accent-secondary: #60A5FA;
      --muted: #1E293B;
      --muted-foreground: #94A3B8;
      --border: #1E293B;
      --border-strong: #334155;
      --card: #0F172A;
      --card-elevated: #1E293B;
      --header-bg: rgba(2, 6, 23, 0.7);
      --terminal-bg: #050505;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--background);
      color: var(--foreground);
      margin: 0;
      overflow-x: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    html.dark body {
      background-color: var(--background) !important;
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            accent: {
              DEFAULT: 'var(--accent)',
              secondary: 'var(--accent-secondary)',
              alpha: 'rgba(0, 82, 255, 0.1)',
            },
            background: 'var(--background)',
            'background-alt': 'var(--background-alt)',
            foreground: 'var(--foreground)',
            muted: {
              DEFAULT: 'var(--muted)',
              foreground: 'var(--muted-foreground)',
            },
            border: 'var(--border)',
            card: {
              DEFAULT: 'var(--card)',
              elevated: 'var(--card-elevated)',
            },
          },
          fontFamily: {
            display: ['Calistoga', 'serif'],
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          boxShadow: {
            'accent': '0 4px 14px rgba(0, 82, 255, 0.25)',
            'accent-lg': '0 8px 24px rgba(0, 82, 255, 0.35)',
            'accent-sm': '0 2px 8px rgba(0, 82, 255, 0.15)',
          },
          animation: {
            'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'float': 'float 5s ease-in-out infinite',
            'spin-slow': 'spin 60s linear infinite',
          }
        },
      },
    }
  </script>
  <style>

    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* Selection Color */
    ::selection {
      background: rgba(0, 82, 255, 0.2);
      color: #0052FF;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "framer-motion": "https://esm.sh/framer-motion@11.1.7"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
